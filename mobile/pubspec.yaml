name: mobile
description: "AuraSynq V2 - Cross-Platform Real-time Music Streaming Client"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Audio Playback & Background Services
  just_audio: ^0.9.42
  audio_service: ^0.18.12

  # Networking & Real-time communication
  socket_io_client: ^3.1.2
  http: ^1.2.2

  # Database & State Management
  supabase_flutter: ^2.8.1
  flutter_riverpod: ^2.6.1

  # UI & Styling
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
